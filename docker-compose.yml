services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "4444:4444"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      server:
        condition: service_healthy
    networks:
      - app-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5555:5555"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5555
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:5555/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
