<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}}</title>
    <style>
      body {
        font-family: 'Montserrat Alternates', sans-serif;
        background-color: #161616;
        color: #eadeda;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        padding: 0;
      }
      .container {
        text-align: center;
        max-width: 600px;
        padding: 20px;
      }
      h1 {
        color: {{titleColor}};
        margin-bottom: 20px;
        font-size: 36px;
      }
      .content {
        margin: 20px 0;
        padding: 25px;
        background-color: {{contentBgColor}};
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      }
      .content p {
        margin: 10px 0;
        font-size: 18px;
        line-height: 1.5;
      }
      .message {
        font-size: 20px;
        font-weight: 500;
      }
      .details {
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }
      .status-message {
        text-align: center;
      }
      .success-count {
        color: #4CAF50;
        font-size: 20px;
      }
      .error-count {
        color: #F44336;
        font-size: 20px;
      }
      .highlight {
        font-weight: bold;
        font-size: 24px;
      }
      .error-message {
        color: #F44336;
        font-size: 18px;
      }
      .not-found, .backup-not-found {
        padding: 10px;
      }
      .api-id, .api-title {
        font-weight: bold;
        color: #FFC107;
      }
      .suggestion {
        font-size: 16px;
        color: #BDBDBD;
        font-style: italic;
        margin-top: 15px;
      }
      .back-btn {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 25px;
        background-color: #15e3d9;
        color: #161616;
        text-decoration: none;
        border-radius: 4px;
        font-size: 16px;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      .back-btn:hover {
        background-color: #00909d;
        color: #eadeda;
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>{{heading}}</h1>
      <div class="content">{{content}}</div>
      <a href="/" class="back-btn">Return to Home</a>
    </div>
  </body>
</html>
